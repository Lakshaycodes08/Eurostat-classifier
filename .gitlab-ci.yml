stages:
  - tag
  - release
  - pages
  - npm-publish
  - wiki-sync

variables:
  # Required so jobs can see tags/history for versioning.
  GIT_DEPTH: "0"
  # Single source of truth for GitLab project path (repo can be renamed/moved).
  # If set, jobs should prefer this over hardcoded URLs.
  SWYTCHCODE_GITLAB_PROJECT_PATH: "swytchcode/cli"

# 1) Automatic tagging on merge to main.
# This job computes the next semver tag and pushes it.
auto_tag:
  stage: tag
  image: alpine:3.19
  rules:
    - if: $CI_COMMIT_BRANCH == "main" && $CI_COMMIT_TAG == null
  resource_group: release-tagging
  before_script:
    - apk add --no-cache git bash curl
    # Verify token is set (supports job-specific override)
    - |
      TAG_TOKEN="${GITLAB_TAG_TOKEN:-${GITLAB_TOKEN:-}}"
      if [ -z "${TAG_TOKEN}" ]; then
        echo "ERROR: Missing token for auto_tag."
        echo "Set GITLAB_TAG_TOKEN (preferred) or GITLAB_TOKEN with:"
        echo "- write_repository (to push tags)"
        echo "- read_repository (to fetch tags/history)"
        echo "CI/CD Variables:"
        echo "https://gitlab.com/${SWYTCHCODE_GITLAB_PROJECT_PATH}/-/settings/ci_cd"
        exit 1
      fi
      export GITLAB_TAG_TOKEN="${TAG_TOKEN}"
    # Configure Git user identity for tag creation
    - git config --global user.email "ci@gitlab.com"
    - git config --global user.name "GitLab CI"
    # Push tags using a token with read_repository + write_repository scopes
    - git remote set-url origin "https://oauth2:${GITLAB_TAG_TOKEN}@gitlab.com/${SWYTCHCODE_GITLAB_PROJECT_PATH}.git"
    - git fetch --tags --force
  script:
    - bash scripts/auto_tag.sh

# 2) Build & publish on tags.
goreleaser:
  stage: release
  image:
    name: goreleaser/goreleaser:latest
    entrypoint: [""]
  rules:
    - if: $CI_COMMIT_TAG =~ /^v\d+\.\d+\.\d+/
  before_script:
    - |
      RELEASE_TOKEN="${GITLAB_RELEASE_TOKEN:-${GITLAB_TOKEN:-}}"
      if [ -z "${RELEASE_TOKEN}" ]; then
        echo "ERROR: Missing token for goreleaser GitLab Releases."
        echo "Set GITLAB_RELEASE_TOKEN (preferred) or GITLAB_TOKEN with:"
        echo "- api (required to create GitLab Releases)"
        echo "- maintainer access on ${SWYTCHCODE_GITLAB_PROJECT_PATH}"
        exit 1
      fi
      export GITLAB_TOKEN="${RELEASE_TOKEN}"
    - echo "CI_PROJECT_PATH=${CI_PROJECT_PATH:-}"
    - echo "SWYTCHCODE_GITLAB_PROJECT_PATH=${SWYTCHCODE_GITLAB_PROJECT_PATH}"
    - git remote -v || true
  script:
    - goreleaser release --clean
  artifacts:
    when: always
    paths:
      - dist/
    expire_in: 1 week

# 3) Publish Pages (single landing + releases + install scripts).
pages:
  stage: pages
  image: alpine:3.19
  rules:
    - if: $CI_COMMIT_TAG =~ /^v\d+\.\d+\.\d+/
  needs:
    - job: goreleaser
      artifacts: true
  script:
    - mkdir -p public
    - cp -R pages/* public/
    - sed "s/__LATEST_VERSION__/$CI_COMMIT_TAG/g" public/index.html > public/index.html.tmp && mv public/index.html.tmp public/index.html
    - mkdir -p public/releases/"$CI_COMMIT_TAG"
    - cp -v dist/*.tar.gz dist/*.zip dist/checksums.txt public/releases/"$CI_COMMIT_TAG"/
    - rm -rf public/releases/latest
    - cp -R public/releases/"$CI_COMMIT_TAG" public/releases/latest
    - cp -v install.sh install.ps1 public/
  artifacts:
    paths:
      - public

# 4) Publish npm packages (main + 6 platform packages).
# Uses npm Trusted Publishers (OIDC) — no stored NPM_TOKEN needed.
# One-time setup on npmjs.com per package: Trusted Publishers → namespace=swytchcode, project=cli, file=.gitlab-ci.yml
npm-publish:
  stage: npm-publish
  image: node:20-alpine
  rules:
    - if: '$CI_COMMIT_TAG =~ /^v\d+\.\d+\.\d+$/'
  needs:
    - job: goreleaser
      artifacts: true
  before_script:
    - apk add --no-cache tar unzip
    - echo "//registry.npmjs.org/:_authToken=${NPM_TOKEN}" > ~/.npmrc
  script:
    - VERSION=${CI_COMMIT_TAG#v}
    # Extract each platform binary from the goreleaser dist/ artifacts
    - mkdir -p npm/platforms/darwin-arm64/bin npm/platforms/darwin-x64/bin npm/platforms/linux-arm64/bin npm/platforms/linux-x64/bin npm/platforms/win32-arm64/bin npm/platforms/win32-x64/bin
    # GoReleaser archive root folder naming can vary by target (e.g. v8.0 suffix).
    # Find the swytchcode binary path inside each tarball dynamically.
    - |
      extract_swytchcode_from_tgz() {
        tgz="$1"
        outdir="$2"
        tmpdir=$(mktemp -d)
        tar -xzf "$tgz" -C "$tmpdir"
        binary=$(find "$tmpdir" -name "swytchcode" -type f | head -1)
        if [ -z "$binary" ]; then
          echo "ERROR: swytchcode binary not found in archive: $tgz"
          find "$tmpdir" | head -20
          exit 2
        fi
        cp "$binary" "$outdir/swytchcode"
        chmod +x "$outdir/swytchcode"
        rm -rf "$tmpdir"
      }
      extract_swytchcode_from_tgz dist/swytchcode_darwin_arm64.tar.gz npm/platforms/darwin-arm64/bin/
      extract_swytchcode_from_tgz dist/swytchcode_darwin_amd64.tar.gz npm/platforms/darwin-x64/bin/
      extract_swytchcode_from_tgz dist/swytchcode_linux_arm64.tar.gz  npm/platforms/linux-arm64/bin/
      extract_swytchcode_from_tgz dist/swytchcode_linux_amd64.tar.gz  npm/platforms/linux-x64/bin/
      extract_swytchcode_from_zip() {
        zip="$1"
        outdir="$2"
        exepath="$(unzip -Z1 "$zip" | awk -F/ '$NF=="swytchcode.exe"{print $0; exit 0}')"
        if [ -z "$exepath" ]; then
          echo "ERROR: swytchcode.exe not found in archive: $zip"
          echo "Archive contents (first 50):"
          unzip -Z1 "$zip" | head -n 50
          exit 11
        fi
        unzip -jo "$zip" "$exepath" -d "$outdir"
      }
      extract_swytchcode_from_zip dist/swytchcode_windows_arm64.zip npm/platforms/win32-arm64/bin/
      extract_swytchcode_from_zip dist/swytchcode_windows_amd64.zip npm/platforms/win32-x64/bin/
    # Stamp the release version into every package.json (version + optionalDependencies)
    - |
      for f in $(find npm -name package.json); do
        node -e "
          var fs = require('fs');
          var p = JSON.parse(fs.readFileSync('$f', 'utf8'));
          p.version = '${VERSION}';
          if (p.optionalDependencies) {
            Object.keys(p.optionalDependencies).forEach(function(k) {
              p.optionalDependencies[k] = '${VERSION}';
            });
          }
          fs.writeFileSync('$f', JSON.stringify(p, null, 2) + '\n');
        "
      done
    # Publish platform packages first, then the main wrapper.
    # Skip gracefully if the version is already on npm (handles job retries and manual re-runs).
    - |
      npm_publish_if_new() {
        local pkg_name
        pkg_name="$(node -p "require('./package.json').name")"
        if npm view "${pkg_name}@${VERSION}" version 2>/dev/null | grep -q "^${VERSION}$"; then
          echo "Skipping ${pkg_name}@${VERSION} — already published."
        else
          npm publish --access public
        fi
      }
      for dir in npm/platforms/*/; do
        (cd "$dir" && npm_publish_if_new)
      done
      (cd npm && npm_publish_if_new)

# 5) Sync wiki/ folder to the GitLab wiki repo on every merge to main.
# The wiki/ directory in this repo is the source of truth for all wiki pages.
# GitLab wikis are separate git repos — this job keeps them in sync automatically.
wiki-sync:
  stage: wiki-sync
  image: alpine:3.19
  rules:
    - if: $CI_COMMIT_BRANCH == "main" && $CI_COMMIT_TAG == null
  before_script:
    - apk add --no-cache git
    - git config --global user.email "ci@gitlab.com"
    - git config --global user.name "GitLab CI"
  script:
    - |
      TAG_TOKEN="${GITLAB_TAG_TOKEN:-${GITLAB_TOKEN:-}}"
      if [ -z "${TAG_TOKEN}" ]; then
        echo "ERROR: Missing token for wiki-sync. Set GITLAB_TAG_TOKEN with write_repository scope."
        exit 1
      fi
    - git clone "https://gitlab.com/${SWYTCHCODE_GITLAB_PROJECT_PATH}.wiki.git" wiki-repo
    - cp -R wiki/. wiki-repo/
    - cd wiki-repo
    - git remote set-url origin "https://oauth2:${GITLAB_TAG_TOKEN}@gitlab.com/${SWYTCHCODE_GITLAB_PROJECT_PATH}.wiki.git"
    - git add -A
    - git diff --cached --quiet && echo "No wiki changes." || git commit -m "sync wiki from main [ci skip]"
    - git diff --cached --quiet && echo "Nothing to push." || git push

