stages:
  - tag
  - release
  - pages
  - npm-publish

variables:
  # Required so jobs can see tags/history for versioning.
  GIT_DEPTH: "0"

# 1) Automatic tagging on merge to main.
# This job computes the next semver tag and pushes it.
auto_tag:
  stage: tag
  image: alpine:3.19
  rules:
    - if: $CI_COMMIT_BRANCH == "main" && $CI_COMMIT_TAG == null
  resource_group: release-tagging
  before_script:
    - apk add --no-cache git bash curl
    # Verify token is set
    - |
      if [ -z "${GITLAB_TOKEN:-}" ]; then
        echo "ERROR: GITLAB_TOKEN is not set!"
        echo "Please add GITLAB_TOKEN to CI/CD Variables:"
        echo "https://gitlab.com/swytchcode/swytchcode-cli/-/settings/ci_cd"
        exit 1
      fi
    # Configure Git user identity for tag creation
    - git config --global user.email "ci@gitlab.com"
    - git config --global user.name "GitLab CI"
    # Push tags using a token with read_repository + write_repository scopes
    # Use project path format: swytchcode/cli (URL-encoded: swytchcode%2Fcli)
    - git remote set-url origin "https://oauth2:${GITLAB_TOKEN}@gitlab.com/swytchcode/swytchcode-cli.git"
    - git fetch --tags --force
  script:
    - bash scripts/auto_tag.sh

# 2) Build & publish on tags.
goreleaser:
  stage: release
  image:
    name: goreleaser/goreleaser:latest
    entrypoint: [""]
  rules:
    - if: $CI_COMMIT_TAG =~ /^v\d+\.\d+\.\d+/
  script:
    - export GITLAB_TOKEN=$GITLAB_TOKEN
    - goreleaser release --clean
  artifacts:
    when: always
    paths:
      - dist/
    expire_in: 1 week

# 3) Publish Pages (single landing + releases + install scripts).
pages:
  stage: pages
  image: alpine:3.19
  rules:
    - if: $CI_COMMIT_TAG =~ /^v\d+\.\d+\.\d+/
  needs:
    - job: goreleaser
      artifacts: true
  script:
    - mkdir -p public
    - cp -R pages/* public/
    - sed "s/__LATEST_VERSION__/$CI_COMMIT_TAG/g" public/index.html > public/index.html.tmp && mv public/index.html.tmp public/index.html
    - mkdir -p public/releases/"$CI_COMMIT_TAG"
    - cp -v dist/*.tar.gz dist/*.zip dist/checksums.txt public/releases/"$CI_COMMIT_TAG"/
    - rm -rf public/releases/latest
    - cp -R public/releases/"$CI_COMMIT_TAG" public/releases/latest
    - cp -v install.sh install.ps1 public/
  artifacts:
    paths:
      - public

# 4) Publish npm packages (main + 6 platform packages).
# Uses npm Trusted Publishers (OIDC) — no stored NPM_TOKEN needed.
# One-time setup on npmjs.com per package: Trusted Publishers → namespace=swytchcode, project=cli, file=.gitlab-ci.yml
npm-publish:
  stage: npm-publish
  image: node:20-alpine
  rules:
    - if: '$CI_COMMIT_TAG =~ /^v\d+\.\d+\.\d+$/'
  needs:
    - job: goreleaser
      artifacts: true
  id_tokens:
    OIDC_TOKEN:
      aud: https://registry.npmjs.org
  before_script:
    - apk add --no-cache tar unzip
    - echo "//registry.npmjs.org/:_authToken=${OIDC_TOKEN}" > ~/.npmrc
  script:
    - VERSION=${CI_COMMIT_TAG#v}
    # Extract each platform binary from the goreleaser dist/ artifacts
    - mkdir -p npm/platforms/darwin-arm64/bin npm/platforms/darwin-x64/bin npm/platforms/linux-arm64/bin npm/platforms/linux-x64/bin npm/platforms/win32-arm64/bin npm/platforms/win32-x64/bin
    - tar -xzf dist/swytchcode_darwin_arm64.tar.gz  -C npm/platforms/darwin-arm64/bin/ swytchcode
    - tar -xzf dist/swytchcode_darwin_amd64.tar.gz  -C npm/platforms/darwin-x64/bin/   swytchcode
    - tar -xzf dist/swytchcode_linux_arm64.tar.gz   -C npm/platforms/linux-arm64/bin/  swytchcode
    - tar -xzf dist/swytchcode_linux_amd64.tar.gz   -C npm/platforms/linux-x64/bin/    swytchcode
    - unzip -o dist/swytchcode_windows_arm64.zip swytchcode.exe -d npm/platforms/win32-arm64/bin/
    - unzip -o dist/swytchcode_windows_amd64.zip swytchcode.exe -d npm/platforms/win32-x64/bin/
    # Stamp the release version into every package.json (version + optionalDependencies)
    - |
      for f in $(find npm -name package.json); do
        node -e "
          var fs = require('fs');
          var p = JSON.parse(fs.readFileSync('$f', 'utf8'));
          p.version = '${VERSION}';
          if (p.optionalDependencies) {
            Object.keys(p.optionalDependencies).forEach(function(k) {
              p.optionalDependencies[k] = '${VERSION}';
            });
          }
          fs.writeFileSync('$f', JSON.stringify(p, null, 2) + '\n');
        "
      done
    # Publish platform packages first, then the main wrapper
    - for dir in npm/platforms/*/; do (cd "$dir" && npm publish --access public --provenance); done
    - (cd npm && npm publish --access public --provenance)

