stages:
  - tag
  - release
  - pages

variables:
  # Required so jobs can see tags/history for versioning.
  GIT_DEPTH: "0"

# 1) Automatic tagging on merge to main.
# This job computes the next semver tag and pushes it.
auto_tag:
  stage: tag
  image: alpine:3.19
  rules:
    - if: $CI_COMMIT_BRANCH == "main" && $CI_COMMIT_TAG == null
  resource_group: release-tagging
  before_script:
    - apk add --no-cache git bash curl
    # Verify token is set
    - |
      if [ -z "${GITLAB_TOKEN:-}" ]; then
        echo "ERROR: GITLAB_TOKEN is not set!"
        echo "Please add GITLAB_TOKEN to CI/CD Variables:"
        echo "https://gitlab.com/swytchcode/cli/-/settings/ci_cd"
        exit 1
      fi
    # Configure Git user identity for tag creation
    - git config --global user.email "ci@gitlab.com"
    - git config --global user.name "GitLab CI"
    # Push tags using a token with read_repository + write_repository scopes
    # Use project path format: swytchcode/cli (URL-encoded: swytchcode%2Fcli)
    - git remote set-url origin "https://oauth2:${GITLAB_TOKEN}@gitlab.com/swytchcode/cli.git"
    - git fetch --tags --force
  script:
    - bash scripts/auto_tag.sh

# 2) Build & publish on tags.
goreleaser:
  stage: release
  image:
    name: goreleaser/goreleaser:latest
    entrypoint: [""]
  rules:
    - if: $CI_COMMIT_TAG =~ /^v\d+\.\d+\.\d+/
  variables:
    GITLAB_TOKEN: $GITLAB_TOKEN
  script:
    - goreleaser release --clean
  artifacts:
    when: always
    paths:
      - dist/
    expire_in: 1 week

# 3) Publish binaries publicly via GitLab Pages (works even if repo is private, depending on Pages settings).
# This provides unauthenticated curl downloads from the Pages URL.
pages:
  stage: pages
  image: alpine:3.19
  rules:
    - if: $CI_COMMIT_TAG =~ /^v\d+\.\d+\.\d+/
  needs:
    - job: goreleaser
      artifacts: true
  script:
    - mkdir -p public/releases/"$CI_COMMIT_TAG"
    - cp -v dist/*.tar.gz dist/*.zip dist/checksums.txt public/releases/"$CI_COMMIT_TAG"/
    # Convenience "latest" pointer (static copy). Overwrites on each release.
    - rm -rf public/releases/latest
    - cp -R public/releases/"$CI_COMMIT_TAG" public/releases/latest
    # Basic index
    - |
      cat > public/index.html <<'EOF'
      <!doctype html>
      <html>
      <head><meta charset="utf-8"><title>swytchcode releases</title></head>
      <body>
        <h1>swytchcode releases</h1>
        <p>Artifacts are under <code>/releases/&lt;tag&gt;/</code> and <code>/releases/latest/</code>.</p>
      </body>
      </html>
      EOF
  artifacts:
    paths:
      - public

